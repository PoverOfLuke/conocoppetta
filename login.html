<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accesso · ConoCoppetta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #fff8f0;
            color: #3e2c1f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #fff;
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 380px;
            width: 90%;
        }
        .logo-icon { font-size: 2.4rem; display: block; margin-bottom: 8px; }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            margin-bottom: 4px;
        }
        .sub { color: #7a5f4a; margin-bottom: 28px; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8ddd0;
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.25s;
            font-family: 'Nunito', sans-serif;
        }
        input:focus { border-color: #e53935; }
        button {
            width: 100%;
            padding: 14px;
            background: #e53935;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.25s;
            font-family: 'Nunito', sans-serif;
        }
        button:hover { background: #c62828; }
        .error { color: #e53935; font-size: 0.85rem; margin-top: 12px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <span class="logo-icon">🍦</span>
        <h1>ConoCoppetta</h1>
        <p class="sub">Inserisci le credenziali per accedere</p>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required autocomplete="username" />
            <input type="password" id="password" placeholder="Password" required autocomplete="current-password" />
            <button type="submit">Accedi</button>
        </form>
        <p class="error" id="errorMsg">Credenziali errate.</p>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (user === 'admin' && pass === 'gelato') {
                sessionStorage.setItem('auth', 'true');
                window.location.href = 'index.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
